services:
  postgres:
    image: postgres:16-alpine
    container_name: meyukbu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meyukbu
      POSTGRES_USER: meyukbu
      POSTGRES_PASSWORD: meyukbu
    ports:
      - "5432:5432"
    volumes:
      - meyukbu-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meyukbu -d meyukbu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  meyukbu-postgres:
