project:
  name: "메력서"
  romanized_name: "resumae"
  artifact_name: "메력서"
  language: "ko-KR"
  timezone: "Asia/Seoul"
  tagline: "스펙을 다시 쓰지 말고, 한 장으로 증명하세요."
  purpose: >-
    메이플스토리 캐릭터의 NEXON Open API 조회값과 파티 구직용 작성 내용을
    결합하여 출처·기준시각·버전을 확인할 수 있는 이력서 이미지와 검증 URL을 생성한다.

engineering:
  package_manager: "pnpm"
  frontend: "Next.js App Router + React + TypeScript strict"
  styling: "Tailwind CSS"
  validation: "Zod"
  database: "PostgreSQL"
  orm: "Prisma"
  unit_test: "Vitest + Testing Library"
  e2e_test: "Playwright"
  image: "server-side 1080x1350 PNG"
  local_database: "Docker Compose"

provenance:
  NEXON_API: "API 조회"
  SERVICE_CALCULATED: "서비스 계산"
  USER_PROVIDED: "작성 내용"
  SERVICE_OBSERVED: "서비스 관측"

freshness:
  fresh_hours: 24
  public_expiry_days: 30
  versioned_snapshots: true
  immutable_share_versions: true

roles:
  DAMAGE: "격수"
  SUPPORT: "지원"
  UTILITY: "보조"
  OTHER: "기타"

party_types:
  FIXED: "고정"
  SEMI_FIXED: "반고정"
  TEMPORARY: "임시"
  PROGRESSION: "트라이"
  ACHIEVEMENT: "업적"

routes:
  pages:
    - "/"
    - "/create"
    - "/my-resumes"
    - "/parties"
    - "/parties/new"
    - "/parties/[slug]"
    - "/r/[slug]"
    - "/r/[slug]/temperature"
    - "/r/[slug]/image"
    - "/privacy"
    - "/terms"
  api:
    - "GET /api/characters/resolve?name="
    - "POST /api/resumes"
    - "GET /api/my-resumes"
    - "GET /api/party-posts"
    - "POST /api/party-posts"
    - "GET /api/party-posts/[slug]"
    - "PATCH /api/party-posts/[slug]"
    - "GET /api/party-posts/[slug]/applications"
    - "POST /api/party-posts/[slug]/applications"
    - "PATCH /api/party-posts/[slug]/applications/[applicationId]"
    - "GET /api/resumes/[slug]"
    - "POST /api/resumes/[slug]/refresh"
    - "PATCH /api/resumes/[slug]"
    - "DELETE /api/resumes/[slug]"
    - "GET /api/resumes/[slug]/temperature"
    - "POST /api/resumes/[slug]/temperature"
    - "POST /api/resumes/[slug]/temperature/invitations"
    - "GET /api/health"

mvp:
  required:
    - "캐릭터명 조회"
    - "live/mock provider"
    - "실제 live provider의 기본 정보·종합 능력치·장착 전투 장비 조회"
    - "주간·월간 보스 묶음(1~6개)과 보스별 배율·보스 아트"
    - "난이도가 포함된 지원 보스·역할·파티 유형"
    - "전투력 API 원값과 전체 장착 전투 장비 상세"
    - "요일·시간·음성채팅·분배방식·경험"
    - "실시간 메력서 미리보기"
    - "public slug + edit token"
    - "검증 페이지"
    - "1080x1350 PNG"
    - "QR 및 canonical URL"
    - "출처 배지"
    - "기준 시각과 stale/expired"
    - "NEXON 데이터/비제휴 고지"
    - "메붕이 온도 익명 설문과 캐릭터별 누적 게이지"
    - "resume-pinned 사이트 내 파티 모집·파티 찾기·지원·수락/거절"
    - "테스트와 production build"
  forbidden:
    - "단일 종합 점수"
    - "합격/불합격 판정"
    - "메붕이 온도 외의 익명 평판"
    - "메붕이 온도 외의 별점·온도 수치·순위형 평판"
    - "블랙리스트"
    - "공식 제휴로 오해할 표현"
    - "클라이언트 API key"
    - "API에 없는 필드 추측"

nexon:
  mode_env: "NEXON_PROVIDER"
  key_env: "NEXON_OPEN_API_KEY"
  base_url_env: "NEXON_BASE_URL"
  key_header: "x-nxopen-api-key"
  live_base_url_default: "https://open.api.nexon.com/maplestory/v1"
  required_notice: "Data based on NEXON Open API"
  verify_current_official_docs_before_mapping: true
  core_live_calls:
    - "character identifier"
    - "character basic"
    - "character stat (final_stat 원값, 전투력 포함 시 표시)"
    - "character item-equipment (현재 장착 전투 장비 전체)"
  optional_enrichment_calls:
    - "character symbol-equipment"
    - "character cashitem-equipment (전투 장비와 분리)"
    - "character set-effect"
  equipment_display:
    combat_power: "character/stat.final_stat의 API 원값만 표시; 계산·환산 금지"
    detail: "슬롯, 아이템명, 옵션, 스타포스, 잠재, 에디셔널 잠재, 소울"
    share_image: "핵심 지표만 요약; 전체 옵션은 공개 검증 페이지에서 표시"
  boss_selection:
    cadences: ["WEEKLY", "MONTHLY"]
    artwork: "사용자가 허가한 Maple Trackers 보스 아트를 보스 키와 1:1로 사용"

quality_commands:
  - "pnpm lint"
  - "pnpm typecheck"
  - "pnpm test"
  - "pnpm test:e2e"
  - "pnpm build"
